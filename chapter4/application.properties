# MCP Server Configuration
# TODO 1: Set the MCP server name (used for client identification)
#   Hint: spring.ai.mcp.server.name=dice-mcp-server
spring.application.name=dice-mcp-server
spring.ai.mcp.server.name=
spring.ai.mcp.server.version=1.0.0

# TODO 2: Set the MCP server protocol to STREAMABLE (enables HTTP-based streaming transport)
#   Hint: spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.protocol=

spring.ai.mcp.server.instructions=Dice Rolling MCP Server - provides dice rolling tools and prompt templates for tabletop game mechanics
spring.ai.mcp.server.capabilities.prompt=true

# TODO 3: Set the server port to 8080 (the MCP client will connect to this port)
#   Hint: server.port=8080
server.port=

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
